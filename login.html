<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top bg-dua">
    <div class="container">
        <a class="navbar-brand text-white" href="#beranda"><b>
            KEDAI NYONYA RUMAH
        </b></a>


        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="index.html">Beranda</a>
                <a class="nav-link text-white" href="index.html#tentang">Tentang</a>
                <a class="nav-link text-white" href="index.html#daftarmenu">Daftar Menu</a>
                <a class="nav-link text-white" href="index.html#kontak">Kontak</a>
            </div>
        </div>
    </div>
</nav>

<!-- Formulir Login -->
<section class="login-section d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center align-items-center">

            <!-- GAMBAR -->
            <div class="col-md-4 text-center">
            </div>

            <!-- FORM -->
            <div class="col-md-5">
                <div class="login-card p-4">

                    <form onsubmit="login(event)">
                        <div class="mb-3">
                            <label><b>Email</b></label>
                            <input type="email" id="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label><b>Password</b></label>
                            <input type="password" id="password" class="form-control">
                        </div>


                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Login</button>
                            <button type="reset" class="btn btn-secondary">Batal</button>
                        </div>

                        <p class="text-center mt-3">
                            Belum punya akun? <a href="register.html">Daftar Sekarang</a>
                        </p>
                        
                        
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>


<script src="js/login.js"></script>



<footer class="bg-dua text-white py-3 text-center">
    <p class="mb-0"><b>&copy; Kedai Nyonya Rumah</b></p>
</footer>


</body>
</html>
